<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>電子租約簽名</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f4f0e8;--sf:#fdfaf3;--bd:#d8d3c8;--tx:#28241e;--mu:#7a7468;--ac:#8b6840;--gn:#3d7a52;--gl:#d0eadb;--rd:#8b3535;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.header{background:var(--sf);border-bottom:1px solid var(--bd);padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100}
.h-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:400;letter-spacing:.08em}
.h-sub{font-size:10px;color:var(--ac);margin-top:2px}
.container{max-width:800px;margin:0 auto;padding:20px 16px 100px}
.status-msg{text-align:center;padding:60px 20px;color:var(--mu);font-size:16px}
.contract-view{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:28px 24px;margin-bottom:20px;line-height:1.8;font-family:'Noto Serif TC',serif;font-size:13px}
.contract-view .p-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:24px;letter-spacing:.12em}
.contract-view .p-section{margin-bottom:14px}
.contract-view .p-section-title{font-size:14px;font-weight:700;margin-bottom:6px}
.contract-view .p-item{margin-left:14px;margin-bottom:3px;text-indent:-12px;padding-left:12px}
.contract-view .p-item::before{content:'• '}
.contract-view .p-val{font-weight:400}
.contract-view .p-sign{margin-top:28px}
.contract-view .p-sign-line{margin-bottom:10px;line-height:2}
.contract-view .p-covenant{margin-top:36px;padding-top:24px;border-top:2px solid var(--tx)}
.contract-view .p-covenant-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px;letter-spacing:.12em}
.contract-view .p-cov-section{margin-bottom:12px}
.contract-view .p-cov-section-title{font-size:13px;font-weight:700;margin-bottom:4px;text-decoration:underline;text-underline-offset:3px}
.contract-view .p-cov-item{margin-left:14px;margin-bottom:3px;text-indent:-12px;padding-left:12px}
.contract-view .p-cov-item::before{content:'• '}
.sign-section{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:24px;text-align:center}
.sign-section h3{font-size:16px;margin-bottom:8px}
.sign-section p{font-size:12px;color:var(--mu);margin-bottom:16px}
.canvas-wrap{position:relative;display:inline-block;border:2px solid var(--bd);border-radius:8px;background:#fff;touch-action:none}
canvas{display:block;border-radius:6px}
.sign-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.btn{padding:12px 24px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.btn:hover{background:#e8e4da}
.btn-primary{background:var(--gn);color:#fff;border-color:var(--gn);font-size:16px;padding:14px 40px}
.btn-primary:hover{background:#2d6240}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.done-msg{text-align:center;padding:40px 20px;background:var(--gl);border:1px solid var(--gn);border-radius:var(--r)}
.done-msg h2{color:var(--gn);margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <div class="h-title">電子租約簽名</div>
  <div class="h-sub">請詳閱合約內容後於下方簽名</div>
</div>
<div class="container">
  <div id="loading" class="status-msg">載入合約中...</div>
  <div id="expired" class="status-msg" style="display:none">此簽約連結已過期或不存在。</div>
  <div id="alreadySigned" class="done-msg" style="display:none">
    <h2>此合約已簽署完成</h2>
    <p style="color:var(--mu)">感謝您的配合，房東已收到您的簽名。</p>
  </div>
  <div id="main" style="display:none">
    <div class="contract-view" id="contractContent"></div>
    <div class="sign-section" id="signSection">
      <h3>承租人簽名</h3>
      <p>請在下方空白處以手指或滑鼠簽名，簽名後按「確認送出」。</p>
      <div class="canvas-wrap">
        <canvas id="sigCanvas" width="360" height="180"></canvas>
      </div>
      <div class="sign-actions">
        <button class="btn" onclick="clearSig()">清除重簽</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitSignature()">確認送出</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://taulnnhvwxdbptvxfxza.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhdWxubmh2d3hkYnB0dnhmeHphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDE2OTksImV4cCI6MjA4ODY3NzY5OX0.B0BJNKm-QcFezIl-e3WkyHdcuAWyB0XzFR_hIQ439o4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let contractId = null;
let hasDrawn = false;

// === 取得合約 ===
async function loadContract() {
  const params = new URLSearchParams(location.search);
  contractId = params.get('id');
  if (!contractId) { showState('expired'); return; }

  const { data, error } = await sb.from('contracts').select('*').eq('id', contractId).single();
  if (error || !data) { showState('expired'); return; }

  // 已簽名
  if (data.status === 'signed') { showState('alreadySigned'); return; }

  // 檢查是否過期（7天）
  const expires = new Date(data.expires_at);
  if (new Date() > expires) { showState('expired'); return; }

  // 顯示合約
  document.getElementById('contractContent').innerHTML = data.contract_html;
  showState('main');
  initCanvas();
}

function showState(id) {
  ['loading','expired','alreadySigned','main'].forEach(s =>
    document.getElementById(s).style.display = s === id ? '' : 'none'
  );
}

// === 簽名 Canvas ===
function initCanvas() {
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  // 自適應寬度
  const maxW = Math.min(360, window.innerWidth - 80);
  canvas.width = maxW;
  canvas.height = Math.round(maxW * 0.5);
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#000';

  let drawing = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function start(e) {
    e.preventDefault(); drawing = true; hasDrawn = true;
    const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
  }
  function move(e) {
    if (!drawing) return; e.preventDefault();
    const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
  }
  function end() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);
}

function clearSig() {
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
}

// === 送出簽名 ===
async function submitSignature() {
  if (!hasDrawn) { alert('請先在上方簽名欄簽名。'); return; }
  if (!confirm('確定要送出簽名嗎？送出後無法修改。')) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送出中...';

  try {
    const canvas = document.getElementById('sigCanvas');
    const sigData = canvas.toDataURL('image/png');

    const { error } = await sb.from('contracts').update({
      signature_data: sigData,
      status: 'signed',
      signed_at: new Date().toISOString(),
    }).eq('id', contractId);

    if (error) throw error;

    document.getElementById('signSection').style.display = 'none';
    const doneDiv = document.createElement('div');
    doneDiv.className = 'done-msg';
    doneDiv.innerHTML = '<h2>簽名完成</h2><p style="color:var(--mu)">感謝您的配合！房東已收到您的簽名。<br>本合約已生效。</p>';
    document.getElementById('main').appendChild(doneDiv);
  } catch (e) {
    alert('送出失敗：' + e.message);
    btn.disabled = false; btn.textContent = '確認送出';
  }
}

loadContract();
</script>
</body>
</html>
